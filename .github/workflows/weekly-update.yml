name: Weekly e-invoicing data update

on:
  schedule:
    # Ogni lunedì alle 06:00 UTC (08:00 ora italiana)
    - cron: '0 6 * * 1'
  workflow_dispatch: {}   # permette di lanciarlo manualmente da GitHub

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit changes if any
        run: |
          git config user.name "einvoicing-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/countries.json data/meta.json data/changelog.json
          git diff --cached --quiet || git commit -m "chore: weekly data check ($(date -u +'%Y-%m-%d'))"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
