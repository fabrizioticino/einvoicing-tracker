name: Weekly e-invoicing data update

on:
  schedule:
    # Ogni lunedì alle 06:00 UTC (08:00 ora italiana)
    - cron: '0 6 * * 1'
  workflow_dispatch: {}   # permette di lanciarlo manualmente da GitHub

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install urllib3 --quiet || true

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit and push changes
        run: |
          git config user.name "einvoicing-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/countries.json data/meta.json data/changelog.json
          git diff --cached --quiet || git commit -m "chore: aggiornamento automatico dati ($(date -u +'%Y-%m-%d'))"
          git push
