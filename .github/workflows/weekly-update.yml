name: Weekly e-invoicing data update

on:
  schedule:
    # Ogni lunedì alle 06:00 UTC (08:00 ora italiana)
    - cron: '0 6 * * 1'
  workflow_dispatch: {}   # permette di lanciarlo manualmente da GitHub
  push:
    branches: [ master ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install urllib3 --quiet || true

      - name: Run update script (solo lunedi o dispatch)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python scripts/update_data.py

      - name: Commit and push changes
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "einvoicing-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/countries.json data/meta.json data/changelog.json
          git diff --cached --quiet || git commit -m "chore: aggiornamento automatico dati ($(date -u +'%Y-%m-%d'))"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deploy2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Report success
        run: |
          if [ "${{ steps.deploy1.outcome }}" == "success" ]; then
            echo "Deploy riuscito al primo tentativo."
          elif [ "${{ steps.deploy2.outcome }}" == "success" ]; then
            echo "Deploy riuscito al secondo tentativo."
          else
            echo "Deploy riuscito al terzo tentativo."
          fi
